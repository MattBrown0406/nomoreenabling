<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.jpg" type="image/jpeg" />
    
    <!-- Default meta — overridden per-page by React Helmet -->
    <title>No More Enabling — Addiction, Boundaries & Family Recovery</title>
    <meta name="description" content="Education and support for families affected by addiction and enabling. 70+ free articles on boundaries, codependency, and recovery. Start your own healing." />

    <!-- WebSite SearchAction Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "No More Enabling",
      "url": "https://nomoreenabling.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://nomoreenabling.com/articles?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4711693967004790" crossorigin="anonymous"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
